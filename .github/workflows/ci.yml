name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Optional Turborepo remote caching:
    # env:
    #   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    #   TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run lint/type checks
        run: vp run check

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.19.0", "22.12.0", "24"]
    # Optional Turborepo remote caching:
    # env:
    #   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    #   TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: |
          if [ "${{ matrix.node-version }}" = "24" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            vp run test -- --coverage.enabled true --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json
          else
            vp run test
          fi

      - name: Report Vitest Coverage
        if: ${{ github.event_name == 'pull_request' && matrix.node-version == '24' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ./packages/core
