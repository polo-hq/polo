# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Budge vs. full-context-dump baseline — packages/core"

providers:
  - id: "file://providers/budge.ts"
    label: "budge"
    config:
      root: "../../../packages/core"
      include: ["**/*.ts"]
      orchestratorModel: "openai/gpt-5.4-mini"
      workerModel: "openai/gpt-5.4-nano"
      provider: "openrouter"

  - id: "file://providers/baseline.ts"
    label: "baseline (full-context-dump)"
    config:
      root: "../../../packages/core"
      include: ["**/*.ts"]
      model: "openai/gpt-5.4-mini"
      provider: "openrouter"

prompts:
  - "{{task}}"

tests:
  - description: "Identify the six root tools"
    vars:
      task: "What are the six built-in tools available to the root agent when a source supports list, read, and search, and what does each one do?"
    assert:
      - type: icontains
        value: "read_source"
      - type: icontains
        value: "list_source"
      - type: icontains
        value: "search_source"
      - type: icontains
        value: "run_subcall"
      - type: icontains
        value: "run_subcalls"
      - type: icontains
        value: "finish"
    threshold: 1.0

  - description: "Identify where token usage is accumulated"
    vars:
      task: "Where in the codebase is token usage tracked and accumulated? Name the file and the specific mechanism."
    assert:
      - type: icontains
        value: "trace.ts"
      - type: icontains
        value: "TraceBuilder"
      - type: icontains
        value: "addRootUsage"
    threshold: 0.8

  - description: "Explain the two-phase handoff architecture"
    vars:
      task: "Explain the two-phase architecture: what happens in the agent phase vs the handoff phase, and which files own each phase?"
    assert:
      - type: icontains
        value: "agent.ts"
      - type: icontains
        value: "handoff.ts"
      - type: icontains
        value: "runAgent"
      - type: icontains
        value: "buildHandoff"
    threshold: 0.75

  - description: "Identify the stopWhen condition in the agent loop"
    vars:
      task: "What conditions stop the root agent loop, and where exactly is this configured in the code?"
    assert:
      - type: icontains
        value: "stopWhen"
      - type: icontains
        value: "hasToolCall"
      - type: icontains
        value: "stepCountIs"
      - type: icontains
        value: "agent.ts"
    threshold: 0.9

  - description: "Explain path traversal protection in FsAdapter"
    vars:
      task: "How does FsAdapter protect against path traversal attacks? Describe both checks it performs."
    assert:
      - type: icontains
        value: "realpath"
      - type: icontains
        value: "traversal"
      - type: llm-rubric
        value: "The answer describes two distinct traversal checks: (1) a string-based check on the resolved path, and (2) a realpath/symlink dereference check."
    threshold: 0.8

  - description: "Identify the concurrency mechanism in run_subcalls"
    vars:
      task: "How does run_subcalls limit concurrency? What function implements it and what is the default limit?"
    assert:
      - type: icontains
        value: "Effect.forEach"
      - type: icontains
        value: "tools.ts"
      - type: icontains
        value: "5"
    threshold: 0.9

  - description: "Compare the built-in source factories"
    vars:
      task: "Compare the three built-in source factories: source.fs, source.text, and source.json. For each one, explain what it wraps and which access patterns it exposes."
    assert:
      - type: icontains
        value: "source.fs"
      - type: icontains
        value: "source.text"
      - type: icontains
        value: "source.json"
      - type: llm-rubric
        value: "The answer distinguishes filesystem navigation from inline text/json sources, and notes that text/json can expose list/read/search only when chunking is enabled."
    threshold: 0.75

  - description: "Explain how source.text decides between blob and chunked modes"
    vars:
      task: "How does source.text decide whether to expose only read() versus list/read/search? Explain the threshold behavior and what tools become available in each mode."
    assert:
      - type: icontains
        value: "chunkThreshold"
      - type: icontains
        value: "read_source"
      - type: icontains
        value: "search_source"
      - type: llm-rubric
        value: "The answer explains that short text stays as a single blob with read only, while longer text is chunked and exposes list/read/search over chunk IDs."
    threshold: 0.8

  - description: "Explain FsAdapter include and exclude globs"
    vars:
      task: "How do include and exclude globs work in FsAdapter now? Explain which operations they affect and whether they are hard boundaries or soft hints."
    assert:
      - type: icontains
        value: "include"
      - type: icontains
        value: "exclude"
      - type: llm-rubric
        value: "The answer states that include and exclude are glob filters over relative paths and that they apply consistently to listing, reading, search, and file counts rather than just search or listing."
    threshold: 0.8

outputPath: "./results/latest.json"
sharing: false

evaluateOptions:
  maxConcurrency: 2
  timeoutMs: 600000
