prompts:
  - "{{payload}}"
tests:
  - description: "Synthesis: How does Next.js's App Router handle the transition from a Server Com..."
    vars:
      payload: How does Next.js's App Router handle the transition from a Server Component to a Client Component at the module boundary? Walk through the compilation, bundling, and runtime steps.
    assert:
      - type: llm-rubric
        value: "Answer traces the full path: RSC compilation marks client boundaries, bundler splits server/client chunks, flight protocol serializes the boundary, client runtime hydrates. Must reference specific source files or modules, not just describe the concept abstractly. An answer that only describes the concepts without naming implementation files or functions should score below 0.7."
      - type: icontains
        value: flight
      - type: icontains
        value: use client
    metadata:
      category: cross-source-synthesis
      taskType: task
  - description: "Synthesis: Explain how Next.js middleware, edge runtime, and the router interact..."
    vars:
      payload: Explain how Next.js middleware, edge runtime, and the router interact during a request to a dynamic route with ISR enabled. What are the caching layers involved?
    assert:
      - type: llm-rubric
        value: Answer covers middleware execution at the edge, router resolution for dynamic params, ISR cache lookup, revalidation flow, and how these layers compose. Must identify at least three distinct caching mechanisms AND reference specific source files where each mechanism is implemented. Conceptual-only answers without file references should score below 0.7.
    metadata:
      category: cross-source-synthesis
      taskType: task
  - description: "Synthesis: How does Next.js implement partial prerendering? Trace from the build..."
    vars:
      payload: How does Next.js implement partial prerendering? Trace from the build step through the Suspense boundary handling to what gets served on first request vs subsequent requests.
    assert:
      - type: llm-rubric
        value: Answer explains static shell generation at build, dynamic holes marked by Suspense, streaming of dynamic content on first request, and caching behavior for subsequent requests. Must distinguish between the static and dynamic parts of the response AND name specific source files involved in each phase. Answers that describe the concept correctly but without file-level evidence should score below 0.7.
    metadata:
      category: cross-source-synthesis
      taskType: task
  - description: "Synthesis: Compare how errors propagate in the App Router (error.tsx, global-err..."
    vars:
      payload: Compare how errors propagate in the App Router (error.tsx, global-error.tsx, not-found.tsx) versus the Pages Router (pages/_error.tsx, pages/404.tsx). What are the structural differences in how errors are caught and rendered?
    assert:
      - type: llm-rubric
        value: Answer identifies the nested error boundary model in App Router versus the flatter Pages Router model, explains how error.tsx creates per-segment boundaries, and notes concrete differences in recovery behavior. Must reference specific source files that implement each error handling path. Conceptual comparisons without code-level evidence should score below 0.7.
    metadata:
      category: cross-source-synthesis
      taskType: task
  - description: "Synthesis: How does the Next.js image optimization pipeline work end-to-end? Tra..."
    vars:
      payload: How does the Next.js image optimization pipeline work end-to-end? Trace from the <Image> component in source through the image loader, the optimization API route, and the caching or serving layer.
    assert:
      - type: llm-rubric
        value: Answer covers the Image component's props and loader selection, the /_next/image handler, the optimization step, content-type negotiation, and multiple cache layers. Must reference at least three specific implementation files across different layers of the pipeline. Answers citing fewer than three files or only conceptual descriptions should score below 0.7.
    metadata:
      category: cross-source-synthesis
      taskType: task
  - description: "Lookup: What is the maximum number of dynamic route parameters Next.js suppor..."
    vars:
      payload: What is the maximum number of dynamic route parameters Next.js supports in a single route segment, and where is this limit enforced in the source?
    assert:
      - type: llm-rubric
        value: Answer identifies the specific limit if one exists, or correctly states there is no hard limit, and points to the relevant source file.
    metadata:
      category: targeted-lookup
      taskType: task
  - description: "Lookup: Find the default configuration for the Next.js image optimization loa..."
    vars:
      payload: Find the default configuration for the Next.js image optimization loader. What formats does it support and what are the default quality and size breakpoints?
    assert:
      - type: llm-rubric
        value: Answer lists concrete default values for quality, device sizes, image sizes, and supported formats, with file references.
    metadata:
      category: targeted-lookup
      taskType: task
  - description: "Lookup: Where in the Next.js source is the 'use server' directive parsed and ..."
    vars:
      payload: Where in the Next.js source is the 'use server' directive parsed and what transformation does it trigger during compilation?
    assert:
      - type: icontains
        value: use server
      - type: llm-rubric
        value: Answer identifies the specific file or files that parse the directive and describes the resulting transformation such as server action proxy generation or action ID assignment.
    metadata:
      category: targeted-lookup
      taskType: task
  - description: "Lookup: What HTTP headers does Next.js set by default on static assets served..."
    vars:
      payload: What HTTP headers does Next.js set by default on static assets served from the public directory, and where is this configured in the source?
    assert:
      - type: llm-rubric
        value: Answer identifies concrete headers such as cache-control and points to where they are set in the source.
    metadata:
      category: targeted-lookup
      taskType: task
  - description: "Lookup: How does Next.js detect whether a page component is async (Server Com..."
    vars:
      payload: How does Next.js detect whether a page component is async (Server Component) versus sync (Client Component) at build time? What is the detection mechanism?
    assert:
      - type: llm-rubric
        value: Answer explains the detection mechanism with reference to specific source code, not just the conceptual distinction.
    metadata:
      category: targeted-lookup
      taskType: task
  - description: "Chat: Exploring the routing system"
    vars:
      payload: '{"name":"Exploring the routing system","turns":["How does Next.js resolve which layout.tsx applies to a given route segment?","You mentioned segment-level layouts. How does the metadata generateMetadata merge across nested layouts?","What happens if two nested layouts both define the same title in their metadata?","How does this metadata merging interact with streaming? Is metadata available before the page component resolves?","Can middleware modify the metadata that a layout would produce? What is the execution order?","How does Next.js handle route groups (parenthesized folders) and do they affect the layout tree?","If I have parallel routes (slots with @) alongside a route group, how does the router resolve which layout wraps which slot?","Looking at all of this together, what are the main files in the source that implement the route resolution algorithm?"]}'
    assert:
      - type: llm-rubric
        value: Across the full transcript, the answers stay grounded in the same subsystem, respond to the follow-up questions directly, and remain source-specific rather than generic framework explanations for the scenario "Exploring the routing system".
    metadata:
      category: chat-amortization
      taskType: chat
      scenarioName: Exploring the routing system
  - description: "Chat: Understanding the build pipeline"
    vars:
      payload: "{\"name\":\"Understanding the build pipeline\",\"turns\":[\"What compiler does Next.js use by default and how is it configured?\",\"How does the compiler handle CSS modules? What transformation steps are involved?\",\"Where does tree-shaking happen in the build pipeline, and does it work differently for server versus client bundles?\",\"How does Next.js handle dynamic imports via next/dynamic during the build, and what gets split into separate chunks?\",\"What is the relationship between the turbopack and webpack code paths in the source? Are they separate implementations or shared?\",\"How does Next.js handle server actions during the build? What compilation steps are specific to 'use server' functions?\",\"What happens to middleware during the build - is it compiled differently from page routes?\",\"Summarize the key architectural differences between the webpack and turbopack build paths based on everything we've discussed.\"]}"
    assert:
      - type: llm-rubric
        value: Across the full transcript, the answers stay grounded in the same subsystem, respond to the follow-up questions directly, and remain source-specific rather than generic framework explanations for the scenario "Understanding the build pipeline".
    metadata:
      category: chat-amortization
      taskType: chat
      scenarioName: Understanding the build pipeline
  - description: "Chat: Debugging data fetching"
    vars:
      payload: "{\"name\":\"Debugging data fetching\",\"turns\":[\"How does the fetch() patching in Next.js work for Server Components? What does it intercept?\",\"How does the data cache via next.revalidate interact with the patched fetch?\",\"If I set revalidate: 60 on a fetch call, walk me through exactly what happens at T=0, T=30, and T=61.\",\"How does on-demand revalidation through revalidateTag or revalidatePath interact with the time-based revalidation I just asked about?\",\"Where in the source is the cache key computed for a patched fetch call, and what inputs go into that key?\",\"How does Next.js handle fetch deduplication within a single render pass? Can two components fetching the same URL share a result?\",\"What happens to the fetch cache when a page uses both static and dynamic rendering in the same route via partial prerendering?\",\"Based on everything we've discussed, what are the three most important source files to read if I want to understand the full fetch lifecycle?\"]}"
    assert:
      - type: llm-rubric
        value: Across the full transcript, the answers stay grounded in the same subsystem, respond to the follow-up questions directly, and remain source-specific rather than generic framework explanations for the scenario "Debugging data fetching".
    metadata:
      category: chat-amortization
      taskType: chat
      scenarioName: Debugging data fetching
outputPath: ./results/v2-latest.json
sharing: false
